    - HTML
    - JSON

params:
  author: Jorge Prado
  description: AI & Robotics Engineer. Portfolio and technical blog.
  keywords: AI, Robotics, Machine Learning, Data Engineering
  socialLinks:
    - name: GitHub
      url: https://github.com/jorgepradoh
    - name: LinkedIn
      url: https://linkedin.com/in/jorge-a-prado
  
  theme:
    colorScheme: auto
    darkMode:
      background: "#1A1535"
      primary: "#EDEDED"
      secondary: "#AAA"
      accent1: "#FFB300"
      accent2: "#00B6FF"
    lightMode:
      background: "#F4EED5"
      primary: "#1E1E1E"
      secondary: "#555"
      accent1: "#FFB300"
      accent2: "#00B6FF"
  
  fonts:
    body: "DM Mono"
    headings: "Inter"
  
  analytics:
