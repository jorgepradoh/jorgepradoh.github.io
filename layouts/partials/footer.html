<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
            <div class="social-links">
                {{ range .Site.Params.socialLinks }}
                <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" title="{{ .name }}">{{ .name }}</a>
                {{ end }}
            </div>
        </div>
    </div>
</footer>
