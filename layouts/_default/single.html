{{ define "main" }}
<article class="single-post">
    <header class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="meta">
            <span class="date">{{ .Date.Format "Jan 2, 2006" }}</span>
            {{ if .Params.readingTime }}<span class="reading-time">{{ .Params.readingTime }} min read</span>{{ end }}
        </div>
        {{ if .Params.tags }}
        <div class="tags">
            {{ range .Params.tags }}
            <a href="/tags/{{ . | urlize }}/">{{ . }}</a>
            {{ end }}
        </div>
        {{ end }}
    </header>
    
    <div class="content">
        {{ .Content }}
    </div>
</article>

<style>
.single-post {
    max-width: 800px;
    margin: 0 auto;
}

.post-header {
    margin-bottom: 3rem;
    border-bottom: 2px solid var(--secondary);
    padding-bottom: 2rem;
}

.post-header h1 {
    margin: 0 0 1rem 0;
}

.meta {
    display: flex;
    gap: 1rem;
    font-size: 0.9rem;
    color: var(--secondary);
    margin-bottom: 1rem;
}

.tags {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.tags a {
    background: var(--secondary);
    color: var(--bg);
    padding: 0.35rem 1rem;
    border-radius: 4px;
    font-size: 0.85rem;
    transition: all 0.2s;
}

.tags a:hover {
    background: var(--accent1);
    text-decoration: none;
}

.content {
    line-height: 1.8;
    font-size: 1.1rem;
}

.content h2 {
    margin-top: 2.5rem;
    border-top: 1px solid var(--secondary);
    padding-top: 1rem;
}

.content pre {
    background: var(--secondary);
    padding: 1rem;
    border-radius: 4px;
    overflow-x: auto;
}

.content code {
    background: var(--secondary);
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
}
</style>
{{ end }}
